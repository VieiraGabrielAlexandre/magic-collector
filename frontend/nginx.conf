server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router: redireciona tudo para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets versionados pelo Vite
    location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml;
    gzip_min_length 1024;
}
